name: Lint & Test
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v7
        with:
          skip-cache: true
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_USER: indexd_test
      POSTGRES_PASSWORD: indexd_test
      POSTGRES_DB: indexd_test
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: indexd_test
          POSTGRES_PASSWORD: indexd_test
          POSTGRES_DB: indexd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Test
        uses: n8maninger/action-golang-test@v2
        with:
          args: -race;-failfast
